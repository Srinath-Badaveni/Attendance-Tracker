<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKR Attendance Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .fade-in {
            animation: fade 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <div id="login-box"
        class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.05)] fade-in">
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl mb-6 shadow-inner">
                <i class="fas fa-bolt text-3xl"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">TKR Sync</h2>
            <p class="text-slate-500 mt-2 font-medium">Enter Roll No to access Dashboard</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="relative">
                <label class="text-sm font-bold text-slate-700 ml-1">Roll Number</label>
                <div class="relative mt-2">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                        <i class="fas fa-id-card"></i>
                    </span>
                    <input type="text" id="rollNo" placeholder="e.g. 23K91A0523" required
                        class="w-full pl-11 pr-4 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-blue-500 focus:bg-white transition-all outline-none text-slate-700 font-semibold">
                </div>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-blue-600 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                <span>Sync Dashboard</span>
                <i class="fas fa-arrow-right text-sm"></i>
            </button>

            <div id="loading-area" class="hidden text-center">
                <div class="flex justify-center mb-3">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-100 h-8 w-8"></div>
                </div>
                <p id="loader-text" class="text-sm font-bold text-blue-600 animate-pulse">Connecting to TKR Portal...
                </p>
            </div>
        </form>
    </div>

    <div id="dashboard" class="hidden w-full max-w-6xl fade-in space-y-8 pb-20"></div>

    <script>
        const loginForm = document.getElementById('login-form');
        const rollNoInput = document.getElementById('rollNo');
        const submitBtn = document.getElementById('submit-btn');
        const loadingArea = document.getElementById('loading-area');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const rollNo = rollNoInput.value.trim();
            if (!rollNo) return;

            submitBtn.classList.add('hidden');
            loadingArea.classList.remove('hidden');

            try {
                const res = await fetch("http://localhost:3000/attendance", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ rollNo })
                });

                const data = await res.json();
                if (data.error) throw new Error(data.error);

                renderData(data);
            } catch (err) {
                alert("Sync Failed: " + err.message);
                submitBtn.classList.remove('hidden');
                loadingArea.classList.add('hidden');
            }
        });

        function renderData(data) {
            document.getElementById("login-box").classList.add("hidden");
            const dash = document.getElementById("dashboard");
            dash.classList.remove("hidden");

            // 1. Correctly Access Summary Data
            const percent = parseFloat(data.summary.percentage || 0);
            const summary = data.summary;
            const info = data.latestDayInfo;

            // 2. Correctly Access Subject Data
            const subjects = Object.entries(data.subjects);

            const periodsHTML = info.periods.map((status, index) => {
                const isAbsent = status.toLowerCase().includes('absent');
                const isBlank = status === '--' || status === '';
                const colorClass = isAbsent ? 'bg-red-50 border-red-100 text-red-600' :
                    isBlank ? 'bg-slate-50 border-slate-100 text-slate-400' :
                        'bg-emerald-50 border-emerald-100 text-emerald-600';

                return `
            <div class="flex-1 min-w-[140px] p-4 rounded-[1.5rem] border ${colorClass} text-center shadow-sm">
                <p class="text-[10px] font-black uppercase opacity-60 mb-1">Period ${index + 1}</p>
                <p class="text-xs font-bold truncate">${status || '--'}</p>
            </div>
        `;
            }).join('');

            dash.innerHTML = `
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 px-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">${data.studentName}</h1>
                <p class="text-slate-500 font-bold uppercase text-[11px] tracking-widest mt-1 italic">TKRCET • Computer Science Engineering</p>
            </div>
            <button onclick="location.reload()" class="px-6 py-3 bg-white text-slate-700 font-bold rounded-2xl shadow-sm border border-slate-200 hover:text-red-500 transition-all flex items-center gap-2">
                <i class="fas fa-power-off"></i> Logout
            </button>
        </div>

        <div class="mx-2 bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest flex items-center gap-2">
                    <i class="fas fa-calendar-day text-blue-600"></i> ${info.date} (${info.day})
                </h3>
                <span class="text-[10px] font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase">Today's Timeline</span>
            </div>
            <div class="flex flex-wrap gap-4">
                ${periodsHTML}
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 px-2">
            <div class="lg:col-span-2 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col justify-between relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">Aggregate Progress</p>
                    <h2 class="text-7xl font-black text-slate-900 mt-2">${percent}%</h2>
                    <div class="mt-8">
                        <div class="flex justify-between text-sm font-bold mb-2">
                            <span class="text-slate-400">Target: 75%</span>
                            <span class="${percent >= 75 ? 'text-emerald-500' : 'text-red-500'}">${percent}%</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-4 p-1">
                            <div class="h-full rounded-full bg-blue-600 shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-all duration-1000" 
                                 style="width:${percent}%"></div>
                        </div>
                    </div>
                </div>
                <i class="fas fa-chart-line absolute -right-10 -bottom-10 text-[15rem] text-slate-50 -rotate-12"></i>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 flex items-center gap-5">
                    <div class="w-14 h-14 bg-indigo-50 text-indigo-500 rounded-2xl flex items-center justify-center text-xl shadow-inner"><i class="fas fa-calendar-alt"></i></div>
                    <div><p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Conducted</p><p class="text-2xl font-black text-slate-800">${summary.conducted}</p></div>
                </div>
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 flex items-center gap-5">
                    <div class="w-14 h-14 bg-emerald-50 text-emerald-500 rounded-2xl flex items-center justify-center text-xl shadow-inner"><i class="fas fa-user-check"></i></div>
                    <div><p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Present</p><p class="text-2xl font-black text-slate-800">${summary.present}</p></div>
                </div>
                <div class="bg-white p-5 rounded-[2rem] border border-slate-100 flex items-center gap-5">
                    <div class="w-14 h-14 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center text-xl shadow-inner"><i class="fas fa-user-times"></i></div>
                    <div><p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Absent</p><p class="text-2xl font-black text-slate-800">${summary.absent}</p></div>
                </div>
            </div>
        </div>

        <div class="px-4 mt-8"><h3 class="text-xl font-black text-slate-800 flex items-center gap-2"><i class="fas fa-layer-group text-blue-600 text-sm"></i> Subject-Wise Analysis</h3></div>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 px-2 mt-4">
            ${subjects.map(([name, val]) => {
                // val is '46/57'
                const [p, c] = val.split('/').map(Number);
                const subP = Math.round((p / c) * 100) || 0;
                let status = subP < 75 ? 'Critical' : (subP < 80 ? 'Warning' : 'Good');
                let styles = {
                    Critical: 'bg-red-50/50 text-red-600 border-red-100',
                    Warning: 'bg-amber-50/50 text-amber-600 border-amber-100',
                    Good: 'bg-emerald-50/50 text-emerald-600 border-emerald-100'
                }[status];

                return `
                    <div class="${styles} border backdrop-blur-md p-6 rounded-[2.5rem] shadow-sm transition-all hover:shadow-md relative overflow-hidden group">
                        <div class="flex justify-between items-start mb-6 relative z-10">
                            <p class="text-[10px] font-black uppercase tracking-widest opacity-60 truncate w-32">${name}</p>
                            <span class="text-[9px] font-black uppercase px-2 py-1 rounded-lg bg-white/50">${status}</span>
                        </div>
                        <div class="flex items-center gap-5 relative z-10">
                            <div class="relative flex items-center justify-center">
                                <svg class="w-16 h-16 transform -rotate-90">
                                    <circle class="text-slate-200/50" stroke-width="5" stroke="currentColor" fill="transparent" r="28" cx="32" cy="32"/>
                                    <circle class="stroke-current transition-all duration-1000" stroke-width="5" stroke-dasharray="175.9" stroke-dashoffset="${175.9 * (1 - subP / 100)}" stroke-linecap="round" fill="transparent" r="28" cx="32" cy="32"/>
                                </svg>
                                <span class="absolute text-sm font-black text-slate-800">${subP}%</span>
                            </div>
                            <div><p class="text-2xl font-black text-slate-800 tracking-tighter">${val}</p><p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Attended</p></div>
                        </div>
                        <i class="fas fa-book-open absolute -right-3 -bottom-3 text-5xl text-slate-900/5 rotate-12 group-hover:scale-110 transition-transform"></i>
                    </div>`;
            }).join('')}
        </div>
    `;
        }
    </script>
</body>

</html>
